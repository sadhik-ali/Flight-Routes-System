<!DOCTYPE html>
<html>
<head>
    <title>Airports</title>
    <style>
        body { font-family: Arial; background: #f4f6f8; text-align: center; }
        table { margin: auto; border-collapse: collapse; width: 60%; }
        th, td { padding: 12px; border: 1px solid #ddd; }
        th { background: #007bff; color: white; }
        a { margin: 5px; text-decoration: none; }
        .btn { padding: 8px 12px; border-radius: 6px; color: white; }
        .add { background: green; }
        .edit { background: orange; }
        .delete { background: red; }
    </style>
</head>
<body>

<h2>✈️ Airport List <a href="{% url 'web:airport_create' %}" class="btn add">➕ Add Airport</a></h2>


<table>
    <tr>
        <th>ID</th>
        <th>Code</th>
        <th>Actions</th>
    </tr>

    {% for airport in airports %}
    <tr>
        <td>{{ airport.id }}</td>
        <td>{{ airport.code }}</td>
        <td>
            <a href="{% url 'web:airport_update' airport.id %}" class="btn edit">Edit</a>
            <a href="{% url 'web:airport_delete' airport.id %}" class="btn delete">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
