<!DOCTYPE html>
<html>
<head>
    <title>Delete Airport</title>
</head>
<body style="text-align:center; margin-top:50px;">

<h2>Are you sure you want to delete "{{ airport.code }}"?</h2>

<form method="post">
    {% csrf_token %}
    <button type="submit" style="background:red; color:white; padding:10px;">Yes Delete</button>
</form>

<br>
<a href="{% url 'web:airport_list' %}">Cancel</a>

</body>
</html>
