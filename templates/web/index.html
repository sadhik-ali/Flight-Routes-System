<!DOCTYPE html>
<html>
<head>
    <title>Flight Routes System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f6f8;
        }

        h1 {
            margin-top: 40px;
        }

        .container {
            margin-top: 50px;
        }

        .btn {
            display: inline-block;
            padding: 15px 25px;
            margin: 10px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn:hover {
            background: #0056b3;
        }

        .logout {
            background: red;
        }
    </style>
</head>
<body>

    <h1>✈️ Flight Routes System</h1>

    <div class="container">
        <a href="{% url 'web:add_route' %}" class="btn">➕ Add Route</a>
        <a href="{% url 'web:nth_node' %}" class="btn">🔍 Find Nth Node</a>
        <a href="{% url 'web:longest' %}" class="btn">📏 Longest Route</a>
        <a href="{% url 'web:shortest' %}" class="btn">⚡ Shortest Path</a>
        <a href="{% url 'web:airport_list' %}" class="btn airport">🏢 Manage Airports</a>

        {% comment %} <a href="/logout/" class="btn logout">🚪 Logout</a> {% endcomment %}
    </div>

</body>
</html>
